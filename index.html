<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KRATOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8112A;
  --red-dim:rgba(232,17,42,0.12);
  --bg:#0A0A0A;
  --s1:#111;
  --s2:#191919;
  --border:rgba(255,255,255,0.07);
  --text:#F0F0F0;
  --muted:#555;
  --muted2:#888;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
body {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,17,42,0.05) 0%, transparent 60%), #0A0A0A;
}
.logo-wrap { text-align:center; margin-bottom:40px; }
.logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:4rem; letter-spacing:0.15em;
  color:var(--red); line-height:1;
  text-shadow: 0 0 40px rgba(232,17,42,0.3);
}
.logo-sub {
  font-size:0.65rem; font-weight:600; letter-spacing:0.3em;
  text-transform:uppercase; color:var(--muted2); margin-top:6px;
}
.card {
  width:100%; max-width:360px;
  background:var(--s1); border:1px solid var(--border);
  border-radius:20px; padding:28px 24px;
}
.card-title {
  font-family:'Bebas Neue',sans-serif; font-size:1.4rem;
  letter-spacing:0.06em; margin-bottom:20px;
}
.field { margin-bottom:14px; }
.field label {
  display:block; font-size:0.62rem; font-weight:700;
  letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted2); margin-bottom:6px;
}
.field input {
  width:100%; padding:13px 14px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:10px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.95rem;
  outline:none; transition:border-color 0.15s;
  -webkit-appearance:none; appearance:none;
}
.field input:focus { border-color:rgba(232,17,42,0.5); }
.field input::placeholder { color:var(--muted); }
.login-btn {
  width:100%; padding:15px; margin-top:6px;
  background:var(--red); color:white; border:none;
  border-radius:12px; font-weight:700; font-size:0.88rem;
  letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; transition:opacity 0.15s;
  box-shadow:0 4px 20px rgba(232,17,42,0.25);
}
.login-btn:active { opacity:0.85; }
.login-btn:disabled { opacity:0.45; cursor:not-allowed; }
.error-box {
  margin-top:12px; padding:10px 13px;
  background:var(--red-dim); border:1px solid rgba(232,17,42,0.25);
  border-radius:9px; font-size:0.78rem; color:#ff7070;
  display:none;
}
.warn-box {
  margin-top:12px; padding:10px 13px;
  background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.25);
  border-radius:9px; font-size:0.75rem; color:#F59E0B;
  display:none; line-height:1.55;
}
.loader {
  display:none; text-align:center; margin-top:12px;
}
.loader-dots {
  display:inline-flex; gap:5px;
}
.loader-dots span {
  width:7px; height:7px; border-radius:50%;
  background:var(--red); animation:bounce 0.9s infinite;
}
.loader-dots span:nth-child(2) { animation-delay:0.15s; }
.loader-dots span:nth-child(3) { animation-delay:0.3s; }
@keyframes bounce {
  0%,80%,100% { transform:scale(0.7); opacity:0.4; }
  40% { transform:scale(1); opacity:1; }
}
.version { margin-top:24px; font-size:0.62rem; color:var(--muted); letter-spacing:0.1em; }

/* Config warning banner */
.config-banner {
  width:100%; max-width:360px;
  background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);
  border-radius:12px; padding:12px 16px; margin-bottom:16px;
  font-size:0.74rem; color:#F59E0B; line-height:1.6; display:none;
}
.config-banner strong { color:#FBBF24; }
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">KRATOS</div>
  <div class="logo-sub">Training Platform</div>
</div>

<div class="config-banner" id="configBanner">
  ⚠️ <strong>Configura Supabase</strong><br>
  Apri index.html e sostituisci <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code> con i valori reali. Vedi SETUP.txt.
</div>

<div class="card">
  <div class="card-title">Accedi</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="la-tua@email.com"
           autocomplete="email" inputmode="email">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="pwdInput" placeholder="••••••••"
           autocomplete="current-password">
  </div>

  <button class="login-btn" id="loginBtn">Entra</button>

  <div class="loader" id="loader">
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<div class="version">KRATOS v3.0</div>

<!-- Supabase UMD (versione stabile, compatibile con tutti i browser) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// ⚠️  SOSTITUISCI QUESTI VALORI con quelli del tuo progetto Supabase
//     supabase.com → Settings → API
// ─────────────────────────────────────────────────────────────────────────────
var SUPABASE_URL = 'https://tzkokgpxqjeyuvyvmqtt.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6a29rZ3B4cWpleXV2eXZtcXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg2ODEsImV4cCI6MjA4ODg0NDY4MX0.sIqJgyh1bAsKNHlFU5Q7LgpaoEJrZlgMlIH4EQx0hyo';
// ─────────────────────────────────────────────────────────────────────────────

var sb = null;

// Mostra banner se keys non configurate
if (SUPABASE_URL.indexOf('XXXXXXX') !== -1) {
  document.getElementById('configBanner').style.display = 'block';
  document.getElementById('loginBtn').disabled = true;
} else {
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    // Check sessione attiva
    sb.auth.getSession().then(function(result) {
      if (result && result.data && result.data.session) {
        redirectByRole(result.data.session.user);
      }
    }).catch(function() {});
  } catch(err) {
    showError('Errore inizializzazione SDK: ' + err.message);
  }
}

// ── EVENT LISTENERS ──────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('pwdInput').focus();
});

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin() {
  var email = document.getElementById('emailInput').value.trim();
  var pwd   = document.getElementById('pwdInput').value;

  hideError();

  if (!email) { showError('Inserisci la tua email.'); return; }
  if (!pwd)   { showError('Inserisci la password.');  return; }
  if (!sb)    { showError('SDK non pronto. Ricarica la pagina.'); return; }

  setLoading(true);

  sb.auth.signInWithPassword({ email: email, password: pwd })
    .then(function(result) {
      setLoading(false);
      if (result.error) {
        showError('Email o password errati.');
        return;
      }
      if (result.data && result.data.user) {
        redirectByRole(result.data.user);
      }
    })
    .catch(function(err) {
      setLoading(false);
      showError('Errore di rete. Controlla la connessione.');
    });
}

// ── REDIRECT per ruolo ────────────────────────────────────────────────────────
function redirectByRole(user) {
  sb.from('profiles')
    .select('role')
    .eq('id', user.id)
    .single()
    .then(function(result) {
      console.log('Profile result:', JSON.stringify(result));
      if (result.error) {
        console.error('RLS error:', result.error.message);
      }
      if (result.data && result.data.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'athlete.html';
      }
    })
    .catch(function(err) {
      console.error('Catch error:', err);
      window.location.href = 'athlete.html';
    });
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loginBtn').style.display = on ? 'none' : 'block';
  document.getElementById('loader').style.display   = on ? 'block' : 'none';
  document.getElementById('loginBtn').disabled = on;
}

function showError(msg) {
  var el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>
</body>
</html>
