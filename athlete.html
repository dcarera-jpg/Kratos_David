<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>KRATOS — Atleta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8112A;--rdim:rgba(232,17,42,.12);
  --blu:#0EA5E9;--bdim:rgba(14,165,233,.12);
  --grn:#10B981;--gdim:rgba(16,185,129,.12);
  --orn:#F59E0B;--odim:rgba(245,158,11,.12);
  --pur:#A855F7;--pdim:rgba(168,85,247,.12);
  --bg:#0A0A0A;--s2:#191919;--s3:#222;--s4:#2C2C2C;
  --bdr:rgba(255,255,255,.07);--txt:#F0F0F0;--mu:#555;--mu2:#888;
  --sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--txt);font-size:15px;display:flex;flex-direction:column;height:100dvh}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.15em;color:var(--red)}
.sub{font-size:.65rem;color:var(--mu2);letter-spacing:.2em;text-transform:uppercase}
.spin{width:24px;height:24px;border:2px solid var(--s4);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.view{display:none;flex-direction:column;flex:1;overflow:hidden}
.view.on{display:flex}
.topbar{padding:13px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bdr)}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--red)}
.badge{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.badge-red{background:var(--rdim);color:var(--red)}
.badge-grn{background:var(--gdim);color:var(--grn)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px 14px calc(14px + var(--sb))}
.bnav{display:flex;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:6px 0 calc(6px + var(--sb));flex-shrink:0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;border:none;background:none}
.bni-ic{font-size:1.25rem}
.bni-lb{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu)}
.bni.on .bni-lb{color:var(--red)}
.sec-label{font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mu2);margin-bottom:10px}
.btn-out{padding:7px 12px;border-radius:8px;background:none;border:1px solid var(--bdr);color:var(--mu2);font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}

/* CALENDARIO */
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;color:var(--txt)}
.week-nav{display:flex;gap:6px}
.week-nav button{padding:5px 10px;border-radius:7px;background:var(--s3);border:1px solid var(--bdr);color:var(--mu2);font-size:.75rem;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-day{border-radius:9px;padding:7px 4px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all .15s;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px}
.cal-day:hover{border-color:var(--red)}
.cal-day.today{border-color:rgba(232,17,42,.5)}
.cal-day.selected{border-color:var(--red);background:var(--rdim)}
.cal-day.has-gym{background:var(--s2)}
.cal-day.has-bike{background:var(--bdim)}
.cal-day.done{background:var(--gdim);border-color:rgba(16,185,129,.4)}
.cal-day-name{font-size:.52rem;font-weight:700;color:var(--mu2);text-transform:uppercase}
.cal-day-num{font-size:.85rem;font-weight:600;line-height:1}
.cal-day-dot{width:5px;height:5px;border-radius:50%;background:var(--red);margin-top:2px}
.cal-day-dot.bike{background:var(--blu)}
.cal-day-dot.done{background:var(--grn)}
.cal-sess-label{font-size:.55rem;color:var(--mu2);margin-top:2px;line-height:1.2;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}

/* SESSION CARD */
.sess-card{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;margin-bottom:10px;overflow:hidden}
.sess-head{padding:13px 14px;display:flex;align-items:center;gap:10px}
.sess-icon{font-size:1.4rem}
.sess-info{flex:1}
.sess-name{font-weight:700;font-size:.95rem}
.sess-meta{font-size:.72rem;color:var(--mu2);margin-top:2px}
.sess-done-pill{padding:4px 10px;border-radius:12px;font-size:.65rem;font-weight:700;background:var(--gdim);color:var(--grn)}

/* EXERCISE ITEM */
.ex-item{border-top:1px solid var(--bdr);overflow:hidden}
.ex-item.done .ex-header{background:rgba(16,185,129,.05)}
.ex-header{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.ex-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:all .2s}
.ex-item.done .ex-check{background:var(--grn);border-color:var(--grn);color:#fff}
.ex-info{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:.88rem}
.ex-tag{font-size:.6rem;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:7px}
.t-mec{background:var(--rdim);color:var(--red)}
.t-met{background:var(--odim);color:var(--orn)}
.t-pre{background:var(--gdim);color:var(--grn)}
.t-str{background:var(--bdim);color:var(--blu)}
.ex-sets-pill{padding:4px 9px;background:var(--s3);border-radius:8px;font-size:.72rem;font-weight:700;color:var(--mu2);flex-shrink:0}
.ex-body{display:none;padding:10px 14px 14px;background:var(--s3)}
.ex-item.open .ex-body{display:block}

/* LOGBOOK */
.ex-notes{font-size:.76rem;color:var(--mu2);line-height:1.5;margin-bottom:10px;padding:8px 10px;background:var(--s4);border-radius:8px}
.pr-banner{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--odim);border-radius:8px;margin-bottom:10px;font-size:.78rem;color:var(--orn)}
.pr-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.sets-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.set-col{background:var(--s4);border-radius:9px;padding:9px 8px}
.set-title{font-size:.62rem;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.set-row{display:flex;gap:5px;align-items:center}
.set-inp{flex:1;padding:7px 8px;background:var(--s3);border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-family:inherit;font-size:.82rem;outline:none;text-align:center;width:0}
.set-inp:focus{border-color:rgba(232,17,42,.4)}
.set-sep{font-size:.65rem;color:var(--mu2)}
.btn-save{width:100%;padding:10px;border-radius:9px;background:var(--red);border:none;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;margin-bottom:6px}
.btn-done{width:100%;padding:9px;border-radius:9px;background:var(--s4);border:1px solid var(--bdr);color:var(--mu2);font-size:.78rem;font-weight:700;cursor:pointer}
.btn-done.marked{background:var(--gdim);border-color:rgba(16,185,129,.3);color:var(--grn)}

/* PROGRESS */
.prog-row{display:flex;gap:5px;padding:10px 14px;border-top:1px solid var(--bdr);flex-wrap:wrap}
.prog-dot{width:9px;height:9px;border-radius:50%;background:var(--s4);border:1.5px solid var(--bdr)}
.prog-dot.done{background:var(--grn);border-color:var(--grn)}

/* MESSAGES */
.msg-area{max-height:300px;overflow-y:auto;padding:10px;background:var(--s3);border-radius:9px;margin-bottom:8px}
.msg-bub{padding:7px 10px;border-radius:9px;margin-bottom:5px;font-size:.8rem;max-width:85%}
.msg-bub.coach{background:var(--pdim);margin-left:auto;text-align:right}
.msg-bub.mine{background:var(--s4)}
.msg-meta{font-size:.6rem;color:var(--mu2);margin-bottom:2px}
.msg-row{display:flex;gap:7px}
.msg-inp{flex:1;padding:10px 12px;background:var(--s3);border:1px solid var(--bdr);border-radius:9px;color:var(--txt);font-family:inherit;font-size:.82rem;outline:none}
.msg-send{padding:10px 14px;background:var(--pur);border:none;border-radius:9px;color:#fff;font-weight:700;cursor:pointer}

/* REST DAY */
.rest-card{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:28px 20px;text-align:center;margin-bottom:12px}
.rest-icon{font-size:2.5rem;margin-bottom:10px}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;color:var(--mu2)}
.rest-sub{font-size:.8rem;color:var(--mu2);margin-top:6px}

/* TIMER */
.timer-wrap{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center;margin-bottom:10px}
.timer-disp{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:.1em;color:var(--txt);transition:color .3s}
.timer-disp.running{color:var(--red)}
.timer-presets{display:flex;gap:6px;justify-content:center;margin:10px 0 12px}
.pre-btn{padding:6px 12px;border-radius:8px;background:var(--s3);border:1px solid var(--bdr);color:var(--mu2);font-size:.75rem;cursor:pointer}
.pre-btn.on{background:var(--rdim);border-color:rgba(232,17,42,.3);color:var(--red)}
.timer-btns{display:flex;gap:8px}
.t-start{flex:2;padding:10px;border-radius:9px;background:var(--red);border:none;color:#fff;font-weight:700;cursor:pointer}
.t-reset{flex:1;padding:10px;border-radius:9px;background:var(--s3);border:1px solid var(--bdr);color:var(--mu2);cursor:pointer}

/* no program */
.no-prog{background:var(--s2);border:1px solid var(--bdr);border-radius:12px;padding:32px 20px;text-align:center}
.no-prog-icon{font-size:2rem;margin-bottom:10px}
.no-prog-title{font-weight:700;font-size:1rem;margin-bottom:6px}
.no-prog-sub{font-size:.8rem;color:var(--mu2)}
</style>
</head>
<body>
<div id="loader">
  <div class="logo">KRATOS</div>
  <div class="sub">Caricamento...</div>
  <div class="spin"></div>
</div>

<!-- VIEW: SETTIMANA (calendario) -->
<div class="view on" id="v-week">
  <div class="topbar">
    <div class="topbar-logo">KRATOS</div>
    <span class="badge badge-red" id="topbar-week">—</span>
    <button class="btn-out" onclick="doLogout()">Esci</button>
  </div>
  <div class="scroll">
    <div class="week-header">
      <div class="week-title" id="cal-week-label">Settimana</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="day-session-area"></div>
  </div>
</div>

<!-- VIEW: TIMER -->
<div class="view" id="v-timer">
  <div class="topbar"><div class="topbar-logo">KRATOS</div><span class="badge badge-red">Timer</span></div>
  <div class="scroll">
    <div class="timer-wrap">
      <div class="timer-disp" id="timerDisp">02:00</div>
      <div class="timer-presets">
        <button class="pre-btn" onclick="setPreset(60)">1'</button>
        <button class="pre-btn on" onclick="setPreset(90)">1'30"</button>
        <button class="pre-btn" onclick="setPreset(120)">2'</button>
        <button class="pre-btn" onclick="setPreset(180)">3'</button>
        <button class="pre-btn" onclick="setPreset(300)">5'</button>
      </div>
      <div class="timer-btns">
        <button class="t-start" id="timerBtn" onclick="toggleTimer()">START</button>
        <button class="t-reset" onclick="resetTimer()">Reset</button>
      </div>
    </div>
    <div style="font-size:.75rem;color:var(--mu2);text-align:center;padding-top:8px">Tocca START dopo ogni serie per il recupero</div>
  </div>
</div>

<!-- VIEW: MESSAGGI -->
<div class="view" id="v-msgs">
  <div class="topbar"><div class="topbar-logo">KRATOS</div><span class="badge badge-red">Coach</span></div>
  <div class="scroll">
    <div class="msg-area" id="msg-area"></div>
    <div class="msg-row">
      <input class="msg-inp" id="msg-inp" placeholder="Scrivi al coach...">
      <button class="msg-send" onclick="sendMsg()">Invia</button>
    </div>
  </div>
</div>

<nav class="bnav">
  <button class="bni on" id="bn-week"  onclick="sv('week')"><span class="bni-ic">&#128197;</span><span class="bni-lb">Settimana</span></button>
  <button class="bni"    id="bn-timer" onclick="sv('timer')"><span class="bni-ic">&#9201;</span><span class="bni-lb">Timer</span></button>
  <button class="bni"    id="bn-msgs"  onclick="sv('msgs')"><span class="bni-ic">&#128172;</span><span class="bni-lb">Coach</span></button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SUPABASE_URL = 'https://tzkokgpxqjeyuvyvmqtt.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6a29rZ3B4cWpleXV2eXZtcXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjg2ODEsImV4cCI6MjA4ODg0NDY4MX0.sIqJgyh1bAsKNHlFU5Q7LgpaoEJrZlgMlIH4EQx0hyo';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var ME = null;
var myProfile = null;
var currentWeek = null;   // week_template object with days
var logbookCache = {};    // seId -> latest logbook row
var prCache = {};         // seId -> previous best
var selectedDay = null;   // day_of_week number currently shown
var today = new Date();
var todayDow = today.getDay() === 0 ? 7 : today.getDay(); // 1=Mon, 7=Sun

// TIMER
var timerSecs = 90, timerRunning = false, timerInterval = null, activePreset = 90;

var DAY_NAMES = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

// ── DEBUG ─────────────────────────────────────────────────────
function showDebug(lines) {
  var el = document.getElementById('debug-box');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debug-box';
    el.style.cssText = 'position:fixed;bottom:80px;left:10px;right:10px;background:#1a1a00;border:1px solid #ff0;color:#ff0;font-size:.65rem;padding:10px;border-radius:8px;z-index:9999;max-height:200px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;word-break:break-all';
    document.body.appendChild(el);
  }
  el.textContent = lines.join('\n');
}

// ── BOOT ─────────────────────────────────────────────────────
function boot() {
  sb.auth.getSession().then(function(r) {
    if (!r.data.session) { location.href = 'index.html'; return; }
    ME = r.data.session.user;
    return sb.from('profiles').select('*').eq('id', ME.id).single();
  }).then(function(r) {
    if (!r || r.error) { location.href = 'index.html'; return; }
    myProfile = r.data;
    document.getElementById('loader').style.display = 'none';

    // DEBUG: mostra cosa c'è nel profilo
    showDebug([
      'PROFILO OK',
      'email: ' + (myProfile.email || ME.email || '?'),
      'role: ' + myProfile.role,
      'current_block_id: ' + myProfile.current_block_id,
      'current_week_id: ' + myProfile.current_week_id,
      '→ ' + (myProfile.current_week_id ? 'CARICO SETTIMANA' : 'NO WEEK ID — vedo no-prog')
    ]);

    if (!myProfile.current_week_id) {
      renderNoProg();
      return;
    }
    loadWeek();
    loadMessages();
  }).catch(function(e) {
    showDebug(['ERRORE BOOT: ' + String(e)]);
    location.href = 'index.html';
  });
}

function renderNoProg() {
  document.getElementById('loader').style.display = 'none';
  var area = document.getElementById('day-session-area');
  area.innerHTML =
    '<div class="no-prog">' +
      '<div class="no-prog-icon">&#128203;</div>' +
      '<div class="no-prog-title">Nessun programma assegnato</div>' +
      '<div class="no-prog-sub">Il tuo coach ti assegner&agrave; presto un programma. Torna a controllare!</div>' +
    '</div>';
  renderCalEmpty();
}

function renderCalEmpty() {
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for (var d = 1; d <= 7; d++) {
    var cell = document.createElement('div');
    cell.className = 'cal-day' + (d === todayDow ? ' today' : '');
    cell.innerHTML = '<div class="cal-day-name">' + DAY_NAMES[d-1] + '</div>' +
                     '<div class="cal-day-num">' + getDayOfMonth(d) + '</div>';
    grid.appendChild(cell);
  }
}

// ── LOAD WEEK ─────────────────────────────────────────────────
function loadWeek() {
  showDebug(['loadWeek() week_id=' + myProfile.current_week_id]);
  sb.from('week_templates')
    .select('*, week_days(*, sessions(id, name, session_type, session_exercises(id, sort_order, sets, reps, rest_sec, notes, exercises(id, name, tag, tag_label, notes))))')
    .eq('id', myProfile.current_week_id)
    .single()
    .then(function(r) {
      if (r.error) { showDebug(['loadWeek ERR: ' + JSON.stringify(r.error)]); renderNoProg(); return; }
      if (!r.data) { showDebug(['loadWeek: data NULL']); renderNoProg(); return; }
      currentWeek = r.data;
      currentWeek.week_days = (currentWeek.week_days || []).sort(function(a,b){return a.day_of_week-b.day_of_week;});
      showDebug([
        'SETTIMANA: ' + currentWeek.name,
        'week_days: ' + currentWeek.week_days.length,
        currentWeek.week_days.map(function(d){return 'G'+d.day_of_week+':'+(d.sessions?d.sessions.name:'null');}).join(' | ')
      ]);
      return loadLogbook();
    }).catch(function(e) { showDebug(['loadWeek CATCH: ' + String(e)]); renderNoProg(); });
}

function loadLogbook() {
  return sb.from('logbook')
    .select('*')
    .eq('athlete_id', ME.id)
    .eq('week_template_id', currentWeek.id)
    .then(function(r) {
      var rows = r.data || [];
      logbookCache = {};
      rows.forEach(function(row) { logbookCache[row.session_exercise_id] = row; });
      return loadPRs();
    });
}

function loadPRs() {
  // Load best previous logbook entries (from any week before current)
  return sb.from('logbook')
    .select('session_exercise_id, set1_kg, set1_reps, set2_kg, set2_reps, set3_kg, set3_reps, logged_date')
    .eq('athlete_id', ME.id)
    .neq('week_template_id', currentWeek.id)
    .order('logged_date', {ascending: false})
    .then(function(r) {
      prCache = {};
      (r.data || []).forEach(function(row) {
        if (!prCache[row.session_exercise_id]) {
          // Find best set
          var best = 0;
          [[row.set1_kg, row.set1_reps],[row.set2_kg, row.set2_reps],[row.set3_kg, row.set3_reps]].forEach(function(s) {
            if (s[0] && s[1]) best = Math.max(best, s[0]);
          });
          prCache[row.session_exercise_id] = { kg: row.set1_kg, reps: row.set1_reps, kg2: row.set2_kg, reps2: row.set2_reps, kg3: row.set3_kg, reps3: row.set3_reps, date: row.logged_date };
        }
      });
      renderWeek();
    });
}

// ── RENDER WEEK ───────────────────────────────────────────────
function renderWeek() {
  // Update topbar
  document.getElementById('topbar-week').textContent = currentWeek.name;
  document.getElementById('cal-week-label').textContent = currentWeek.name;

  // Build calendar
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for (var d = 1; d <= 7; d++) {
    var dayData = getDayData(d);
    var cell = document.createElement('div');
    var hasSess = dayData && dayData.sessions;
    var sessType = hasSess ? dayData.sessions.session_type : 'rest';
    var isDone = isDayDone(dayData);
    var cls = 'cal-day';
    if (d === todayDow) cls += ' today';
    if (d === selectedDay) cls += ' selected';
    if (isDone) cls += ' done';
    else if (hasSess && sessType === 'bike') cls += ' has-bike';
    else if (hasSess && sessType === 'gym') cls += ' has-gym';
    cell.className = cls;
    var dotClass = isDone ? 'done' : (sessType === 'bike' ? 'bike' : '');
    cell.innerHTML =
      '<div class="cal-day-name">' + DAY_NAMES[d-1] + '</div>' +
      '<div class="cal-day-num">' + getDayOfMonth(d) + '</div>' +
      (hasSess ? '<div class="cal-day-dot ' + dotClass + '"></div>' : '') +
      (hasSess ? '<div class="cal-sess-label">' + escHtml(shortSessName(dayData.sessions.name)) + '</div>' : '');
    cell.onclick = (function(dow) { return function() { selectDay(dow); }; })(d);
    grid.appendChild(cell);
  }

  // Default: select today if it has a session, else first session day
  if (!selectedDay) {
    var defaultDay = todayDow;
    if (!getDayData(defaultDay) || !(getDayData(defaultDay) && getDayData(defaultDay).sessions)) {
      for (var dd = 1; dd <= 7; dd++) {
        var ddData = getDayData(dd);
        if (ddData && ddData.sessions) { defaultDay = dd; break; }
      }
    }
    selectDay(defaultDay);
  } else {
    renderDaySession(selectedDay);
  }
}

function selectDay(dow) {
  selectedDay = dow;
  // Update grid selection
  var cells = document.querySelectorAll('.cal-day');
  for (var i = 0; i < cells.length; i++) {
    cells[i].classList.toggle('selected', i + 1 === dow);
  }
  renderDaySession(dow);
}

// ── RENDER DAY SESSION ────────────────────────────────────────
function renderDaySession(dow) {
  var area = document.getElementById('day-session-area');
  area.innerHTML = '';
  var dayData = getDayData(dow);

  if (!dayData || !dayData.sessions) {
    var restCard = document.createElement('div');
    restCard.className = 'rest-card';
    restCard.innerHTML =
      '<div class="rest-icon">&#128164;</div>' +
      '<div class="rest-title">Giorno di Riposo</div>' +
      '<div class="rest-sub">Recupera, dormi bene, mangia pulito.</div>';
    area.appendChild(restCard);
    return;
  }

  var sess = dayData.sessions;
  var sexs = (sess.session_exercises || []).sort(function(a,b){return a.sort_order-b.sort_order;});
  var doneCount = sexs.filter(function(se) { return logbookCache[se.id] && logbookCache[se.id].done; }).length;

  // Session card
  var card = document.createElement('div');
  card.className = 'sess-card';
  var icon = sess.session_type === 'bike' ? '&#128693;' : '&#127947;';

  var sHead = document.createElement('div');
  sHead.className = 'sess-head';
  sHead.innerHTML =
    '<div class="sess-icon">' + icon + '</div>' +
    '<div class="sess-info">' +
      '<div class="sess-name">' + escHtml(sess.name) + '</div>' +
      '<div class="sess-meta">' + doneCount + ' / ' + sexs.length + ' esercizi completati</div>' +
    '</div>' +
    (doneCount === sexs.length && sexs.length > 0 ? '<div class="sess-done-pill">&#10003; Completata</div>' : '');

  // Progress dots
  var progRow = document.createElement('div');
  progRow.className = 'prog-row';
  sexs.forEach(function(se) {
    var dot = document.createElement('div');
    dot.className = 'prog-dot' + ((logbookCache[se.id] && logbookCache[se.id].done) ? ' done' : '');
    dot.id = 'dot-' + se.id;
    progRow.appendChild(dot);
  });

  card.appendChild(sHead);
  card.appendChild(progRow);

  // Exercise items
  if (sess.session_type === 'bike') {
    var bikeDiv = document.createElement('div');
    bikeDiv.style.cssText = 'padding:14px;border-top:1px solid var(--bdr);font-size:.85rem;color:var(--mu2);line-height:1.7';
    bikeDiv.innerHTML = '<strong style="color:var(--txt)">Sessione ciclismo</strong><br>' + escHtml(sess.name);
    card.appendChild(bikeDiv);
  } else {
    sexs.forEach(function(se) { card.appendChild(buildExItem(se, dow)); });
  }

  area.appendChild(card);
}

function buildExItem(se, dow) {
  var log = logbookCache[se.id] || {};
  var pr  = prCache[se.id];
  var ex  = se.exercises || {};
  var isDone = log.done || false;
  var numSets = parseInt(se.sets) || 3;

  var item = document.createElement('div');
  item.className = 'ex-item' + (isDone ? ' done' : '');
  item.id = 'exi-' + se.id;

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'ex-header';
  hdr.innerHTML =
    '<div class="ex-check" id="chk-' + se.id + '">' + (isDone ? '&#10003;' : '') + '</div>' +
    '<div class="ex-info">' +
      '<div class="ex-name">' + escHtml(ex.name || '?') + '</div>' +
      '<span class="ex-tag t-' + (ex.tag||'mec') + '">' + escHtml(ex.tag_label||'Mec') + '</span>' +
    '</div>' +
    '<div class="ex-sets-pill">' + se.sets + '&#215;' + (se.reps||'8-10') + '</div>';
  hdr.onclick = (function(id) { return function() { toggleEx(id); }; })(se.id);

  // Body
  var body = document.createElement('div');
  body.className = 'ex-body';
  body.id = 'exb-' + se.id;

  // Notes
  var notesStr = (ex.notes || '') + (se.notes ? (ex.notes ? ' &bull; ' : '') + se.notes : '');
  if (notesStr) {
    var notesEl = document.createElement('div');
    notesEl.className = 'ex-notes';
    notesEl.innerHTML = notesStr;
    body.appendChild(notesEl);
  }

  // PR Banner
  if (pr) {
    var prEl = document.createElement('div');
    prEl.className = 'pr-banner';
    var prText = '&#127942; Record precedente: ';
    if (pr.kg) prText += pr.kg + 'kg &times; ' + (pr.reps||'?') + ' reps';
    if (pr.kg2) prText += ', ' + pr.kg2 + 'kg &times; ' + (pr.reps2||'?');
    if (pr.kg3) prText += ', ' + pr.kg3 + 'kg &times; ' + (pr.reps3||'?');
    prEl.innerHTML = prText;
    body.appendChild(prEl);
  }

  // Sets grid
  var sGrid = document.createElement('div');
  sGrid.className = 'sets-grid';
  var maxSets = Math.max(numSets, 3);
  for (var si = 1; si <= maxSets; si++) {
    var setCol = document.createElement('div');
    setCol.className = 'set-col';
    var prevKg   = log['set' + si + '_kg'] || '';
    var prevReps = log['set' + si + '_reps'] || '';
    setCol.innerHTML =
      '<div class="set-title">S' + si + '</div>' +
      '<div class="set-row">' +
        '<input class="set-inp" type="number" id="kg' + si + '-' + se.id + '" placeholder="kg" value="' + prevKg + '" inputmode="decimal">' +
        '<span class="set-sep">&#215;</span>' +
        '<input class="set-inp" type="number" id="rp' + si + '-' + se.id + '" placeholder="rep" value="' + prevReps + '" inputmode="numeric">' +
      '</div>';
    sGrid.appendChild(setCol);
  }
  body.appendChild(sGrid);

  // Save button
  var saveBtn = document.createElement('button');
  saveBtn.className = 'btn-save';
  saveBtn.id = 'sbtn-' + se.id;
  saveBtn.textContent = 'Salva logbook';
  saveBtn.onclick = (function(seId, wid) { return function() { saveLog(seId, wid); }; })(se.id, currentWeek.id);

  // Done button
  var doneBtn = document.createElement('button');
  doneBtn.className = 'btn-done' + (isDone ? ' marked' : '');
  doneBtn.id = 'dbtn-' + se.id;
  doneBtn.textContent = isDone ? '&#10003; Completato' : 'Segna come fatto';
  doneBtn.onclick = (function(seId, wid) { return function() { toggleDone(seId, wid); }; })(se.id, currentWeek.id);

  body.appendChild(saveBtn);
  body.appendChild(doneBtn);

  item.appendChild(hdr);
  item.appendChild(body);
  return item;
}

function toggleEx(seId) {
  var item = document.getElementById('exi-' + seId);
  if (item) item.classList.toggle('open');
}

// ── LOGBOOK SAVE ──────────────────────────────────────────────
function saveLog(seId, wid) {
  var btn = document.getElementById('sbtn-' + seId);
  if (btn) { btn.textContent = '...'; btn.disabled = true; }

  var data = {
    athlete_id: ME.id,
    session_exercise_id: seId,
    week_template_id: wid,
    logged_date: today.toISOString().split('T')[0]
  };
  for (var si = 1; si <= 3; si++) {
    var kEl = document.getElementById('kg' + si + '-' + seId);
    var rEl = document.getElementById('rp' + si + '-' + seId);
    data['set' + si + '_kg']   = kEl && kEl.value ? parseFloat(kEl.value) : null;
    data['set' + si + '_reps'] = rEl && rEl.value ? parseInt(rEl.value) : null;
  }
  // Preserve done state
  if (logbookCache[seId]) data.done = logbookCache[seId].done;

  var existing = logbookCache[seId];
  var promise = existing && existing.id
    ? sb.from('logbook').update(data).eq('id', existing.id)
    : sb.from('logbook').insert(data).select().single();

  promise.then(function(r) {
    if (r.error) {
      if (btn) { btn.textContent = 'Errore!'; btn.disabled = false; }
      return;
    }
    var row = r.data || existing;
    if (row) logbookCache[seId] = row;
    if (btn) { btn.textContent = '&#10003; Salvato'; setTimeout(function() { if (btn) { btn.textContent = 'Salva logbook'; btn.disabled = false; } }, 2000); }
  }).catch(function() {
    if (btn) { btn.textContent = 'Errore'; btn.disabled = false; }
  });
}

function toggleDone(seId, wid) {
  var existing = logbookCache[seId];
  var newDone = !(existing && existing.done);
  var data = {
    athlete_id: ME.id, session_exercise_id: seId,
    week_template_id: wid, done: newDone,
    logged_date: today.toISOString().split('T')[0]
  };
  // Carry over kg/reps if exist
  if (existing) {
    data.set1_kg = existing.set1_kg; data.set1_reps = existing.set1_reps;
    data.set2_kg = existing.set2_kg; data.set2_reps = existing.set2_reps;
    data.set3_kg = existing.set3_kg; data.set3_reps = existing.set3_reps;
  }

  var promise = existing && existing.id
    ? sb.from('logbook').update({ done: newDone }).eq('id', existing.id).select().single()
    : sb.from('logbook').insert(data).select().single();

  promise.then(function(r) {
    if (!r || r.error) return;
    logbookCache[seId] = r.data || { done: newDone };
    // Update UI
    var item = document.getElementById('exi-' + seId);
    var chk  = document.getElementById('chk-' + seId);
    var btn  = document.getElementById('dbtn-' + seId);
    var dot  = document.getElementById('dot-' + seId);
    if (item) item.classList.toggle('done', newDone);
    if (chk)  chk.innerHTML = newDone ? '&#10003;' : '';
    if (btn)  { btn.className = 'btn-done' + (newDone ? ' marked' : ''); btn.textContent = newDone ? '&#10003; Completato' : 'Segna come fatto'; }
    if (dot)  dot.className = 'prog-dot' + (newDone ? ' done' : '');
  }).catch(function(){});
}

// ── MESSAGES ─────────────────────────────────────────────────
function loadMessages() {
  var area = document.getElementById('msg-area');
  if (!area) return;
  sb.from('messages').select('*').eq('athlete_id', ME.id).order('created_at', {ascending: true})
    .then(function(r) {
      area.innerHTML = '';
      (r.data || []).forEach(function(m) {
        var b = document.createElement('div');
        b.className = 'msg-bub ' + (m.sender_role === 'admin' ? 'coach' : 'mine');
        b.innerHTML = '<div class="msg-meta">' + (m.sender_role === 'admin' ? '&#128100; Coach' : 'Tu') + ' &middot; ' + fmtDate(m.created_at) + '</div>' + escHtml(m.text);
        area.appendChild(b);
      });
      area.scrollTop = area.scrollHeight;
    }).catch(function(){});
}

function sendMsg() {
  var inp = document.getElementById('msg-inp');
  if (!inp) return;
  var t = inp.value.trim();
  if (!t) return;
  inp.value = '';
  // Find admin/coach id
  sb.from('profiles').select('id').eq('role','admin').limit(1).single()
    .then(function(r) {
      var coachId = r.data ? r.data.id : ME.id;
      return sb.from('messages').insert({ athlete_id: ME.id, sender_id: ME.id, sender_role: 'athlete', text: t });
    }).then(function() { loadMessages(); }).catch(function(){});
}

// ── TIMER ─────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }
function updateTimerDisp() {
  var d = document.getElementById('timerDisp');
  if (d) d.textContent = pad(Math.floor(timerSecs/60)) + ':' + pad(timerSecs%60);
}
function setPreset(s) {
  resetTimer(); timerSecs = s; activePreset = s; updateTimerDisp();
  document.querySelectorAll('.pre-btn').forEach(function(b) { b.classList.remove('on'); });
  var presets = [60,90,120,180,300];
  var idx = presets.indexOf(s);
  var btns = document.querySelectorAll('.pre-btn');
  if (idx >= 0 && btns[idx]) btns[idx].classList.add('on');
  toggleTimer();
}
function toggleTimer() {
  var btn = document.getElementById('timerBtn');
  var disp = document.getElementById('timerDisp');
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    if (btn) btn.textContent = 'START'; if (disp) disp.classList.remove('running');
  } else {
    if (timerSecs === 0 && activePreset) timerSecs = activePreset;
    timerInterval = setInterval(function() {
      if (timerSecs > 0) { timerSecs--; updateTimerDisp(); }
      else { clearInterval(timerInterval); timerRunning = false; if (btn) { btn.textContent = 'START'; } if (disp) disp.classList.remove('running'); }
    }, 1000);
    timerRunning = true;
    if (btn) btn.textContent = 'STOP'; if (disp) disp.classList.add('running');
  }
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false;
  timerSecs = activePreset || 90; updateTimerDisp();
  var btn = document.getElementById('timerBtn'); var disp = document.getElementById('timerDisp');
  if (btn) btn.textContent = 'START'; if (disp) disp.classList.remove('running');
}

// ── VIEW SWITCH ───────────────────────────────────────────────
function sv(name) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); v.style.display = 'none'; });
  document.querySelectorAll('.bni').forEach(function(b) { b.classList.remove('on'); });
  var v = document.getElementById('v-' + name);
  var b = document.getElementById('bn-' + name);
  if (v) { v.style.display = 'flex'; v.classList.add('on'); }
  if (b) b.classList.add('on');
  if (name === 'msgs') loadMessages();
}

// ── HELPERS ───────────────────────────────────────────────────
function getDayData(dow) {
  if (!currentWeek) return null;
  var found = null;
  currentWeek.week_days.forEach(function(d) { if (d.day_of_week === dow) found = d; });
  return found;
}

function isDayDone(dayData) {
  if (!dayData || !dayData.sessions) return false;
  var sexs = dayData.sessions.session_exercises || [];
  if (!sexs.length) return false;
  return sexs.every(function(se) { return logbookCache[se.id] && logbookCache[se.id].done; });
}

function getDayOfMonth(dow) {
  // Calculate date for this day of week in current week
  var d = new Date(today);
  var diff = dow - todayDow;
  d.setDate(d.getDate() + diff);
  return d.getDate();
}

function shortSessName(name) {
  if (!name) return '';
  return name.length > 10 ? name.substring(0, 9) + '...' : name;
}

function fmtDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function doLogout() {
  sb.auth.signOut().then(function() { location.href = 'index.html'; }).catch(function() { location.href = 'index.html'; });
}

boot();
</script>
