<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KRATOS — Atleta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8112A; --red-dim:rgba(232,17,42,0.12);
  --bike:#0EA5E9; --bike-dim:rgba(14,165,233,0.12);
  --green:#10B981; --green-dim:rgba(16,185,129,0.12);
  --orange:#F59E0B; --orange-dim:rgba(245,158,11,0.12);
  --bg:#0A0A0A; --s1:#111; --s2:#191919; --s3:#222; --s4:#2C2C2C;
  --border:rgba(255,255,255,0.07);
  --text:#F0F0F0; --muted:#555; --muted2:#888;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;
  display:flex;flex-direction:column;height:100dvh;}

/* LOADING */
#loadingScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:16px;
}
.ls-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:0.15em;color:var(--red);}
.ls-spinner{width:24px;height:24px;border:2px solid var(--s4);border-top-color:var(--red);
  border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* VIEWS */
.view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* STATUS BAR */
.status-bar{
  padding:14px 18px 10px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sb-left{display:flex;flex-direction:column;}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.1em;color:var(--red);}
.sb-user{font-size:0.65rem;color:var(--muted2);letter-spacing:0.05em;margin-top:1px;}
.sb-right{display:flex;align-items:center;gap:8px;}
.sb-pill{font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;border:1px solid var(--border);
  color:var(--muted2);background:var(--s2);}
.logout-btn{
  padding:5px 10px;border-radius:8px;background:none;
  border:1px solid var(--border);color:var(--muted);
  font-size:0.65rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  cursor:pointer;
}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;padding:16px 16px calc(16px + var(--safe-bottom));}

/* BOTTOM NAV */
.bottom-nav{
  display:flex;background:rgba(10,10,10,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:8px 0 calc(8px + var(--safe-bottom));flex-shrink:0;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;cursor:pointer;border:none;background:none;transition:all 0.15s;
}
.bnav-icon{font-size:1.3rem;}
.bnav-label{font-size:0.6rem;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--muted);transition:color 0.15s;}
.bnav-item.active .bnav-label{color:var(--red);}
.bnav-item.active .bnav-icon{transform:scale(1.1);}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:10px;}
.card-head{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.card-icon{font-size:1.3rem;flex-shrink:0;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;
  letter-spacing:0.06em;line-height:1.1;flex:1;}
.card-badge{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;flex-shrink:0;}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-bike{background:var(--bike-dim);color:var(--bike);}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-muted{background:var(--s3);color:var(--muted2);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.card-body{padding:0 16px 16px;border-top:1px solid var(--border);}

/* SECTION LABEL */
.section-label{font-size:0.6rem;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--muted);margin:16px 0 8px;padding-left:2px;}

/* WEEK STRIP */
.week-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:0 16px 4px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
.week-strip::-webkit-scrollbar{display:none;}
.week-chip{flex-shrink:0;padding:8px 14px;border-radius:10px;
  background:var(--s2);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;}
.week-chip.active{background:var(--red);border-color:var(--red);}
.week-chip.deload{border-color:var(--orange);}
.week-chip.deload.active{background:var(--orange);border-color:var(--orange);}
.wc-num{font-family:'Bebas Neue',sans-serif;font-size:0.8rem;letter-spacing:0.08em;
  color:var(--muted2);display:block;line-height:1;}
.week-chip.active .wc-num{color:rgba(255,255,255,0.7);}
.wc-label{font-size:0.7rem;font-weight:600;color:var(--text);white-space:nowrap;
  display:block;margin-top:2px;}

/* DAY ROWS */
.day-row{display:flex;gap:8px;align-items:center;padding:12px 14px;
  border-radius:12px;background:var(--s2);border:1px solid var(--border);
  margin-bottom:8px;cursor:pointer;transition:all 0.12s;}
.day-row:active{background:var(--s3);transform:scale(0.99);}
.dr-day{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.08em;
  color:var(--muted2);width:32px;flex-shrink:0;}
.dr-sessions{flex:1;display:flex;flex-direction:column;gap:3px;}
.dr-sess{font-size:0.78rem;font-weight:500;color:var(--text);line-height:1.3;}
.dr-sess.bike{color:var(--bike);}
.dr-sess.rest{color:var(--muted);}
.dr-chevron{color:var(--muted);font-size:0.9rem;flex-shrink:0;}

/* DAY VIEW HEADER */
.day-view-header{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.dvh-back{display:flex;align-items:center;gap:6px;color:var(--red);
  font-size:0.8rem;font-weight:600;cursor:pointer;margin-bottom:10px;letter-spacing:0.04em;}
.dvh-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:0.04em;line-height:1;}
.dvh-sub{font-size:0.75rem;color:var(--muted2);margin-top:4px;}

/* EXERCISE ITEMS */
.ex-item{background:var(--s1);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color 0.15s;}
.ex-item.done{border-color:rgba(16,185,129,0.3);opacity:0.7;}
.ex-item.open{border-color:rgba(232,17,42,0.3);}
.ex-header{display:flex;align-items:center;gap:10px;padding:13px 14px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;}
.ex-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--s4);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;flex-shrink:0;transition:all 0.15s;}
.ex-item.done .ex-check{background:var(--green);border-color:var(--green);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-weight:600;font-size:0.88rem;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-tag{font-size:0.58rem;font-weight:700;letter-spacing:0.07em;
  text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-top:3px;display:inline-block;}
.tag-mec{background:var(--red-dim);color:var(--red);}
.tag-met{background:var(--green-dim);color:var(--green);}
.tag-pre{background:var(--orange-dim);color:var(--orange);}
.tag-str{background:rgba(139,92,246,0.12);color:#A78BFA;}
.ex-sets-pill{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red);flex-shrink:0;}
.ex-body{border-top:1px solid var(--border);padding:14px;display:none;}
.ex-item.open .ex-body{display:block;}

/* REP CHIPS */
.rep-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.rep-chip{flex:1;min-width:80px;padding:8px 10px;background:var(--s3);border-radius:8px;text-align:center;}
.rc-label{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px;}
.rc-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--text);display:block;}

.ex-inst{font-size:0.78rem;color:var(--muted2);line-height:1.65;
  padding:10px 12px;background:var(--s2);border-radius:8px;
  border-left:2px solid var(--red);margin-bottom:12px;}

/* LOGBOOK */
.log-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.log-group{display:flex;align-items:center;gap:6px;background:var(--s3);
  border-radius:8px;padding:6px 10px;flex:1;}
.log-group label{font-size:0.62rem;color:var(--muted);font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;}
.log-input{background:none;border:none;color:var(--text);
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;width:52px;
  text-align:center;outline:none;-moz-appearance:textfield;}
.log-input::-webkit-outer-spin-button,.log-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.log-unit{font-size:0.62rem;color:var(--muted2);}

.save-log-btn{
  width:100%;padding:11px;border-radius:10px;
  background:var(--bike-dim);border:1px solid rgba(14,165,233,0.2);
  color:var(--bike);font-weight:700;font-size:0.75rem;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
  margin-bottom:8px;transition:all 0.15s;
}
.save-log-btn:active{background:rgba(14,165,233,0.2);}
.save-log-btn.saved{background:var(--green-dim);border-color:rgba(16,185,129,0.2);color:var(--green);}

.done-btn{width:100%;padding:13px;border-radius:10px;
  background:var(--green-dim);border:1px solid rgba(16,185,129,0.2);
  color:var(--green);font-weight:700;font-size:0.8rem;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
.done-btn:active{background:rgba(16,185,129,0.2);}
.done-btn.marked{background:var(--s3);color:var(--muted);border-color:var(--border);}

/* PROGRESS */
.progress-row{display:flex;gap:6px;margin-bottom:14px;}
.prog-pill{flex:1;height:4px;border-radius:2px;background:var(--s4);transition:background 0.3s;}
.prog-pill.done{background:var(--red);}

/* MESSAGES VIEW */
.msg-bubble{
  padding:12px 14px;border-radius:12px;margin-bottom:8px;
  font-size:0.82rem;line-height:1.55;
}
.msg-bubble.coach{
  background:var(--red-dim);border:1px solid rgba(232,17,42,0.15);
  border-bottom-left-radius:4px;
}
.msg-bubble.athlete{
  background:var(--s2);border:1px solid var(--border);
  border-bottom-right-radius:4px;margin-left:20px;
}
.msg-meta{font-size:0.62rem;color:var(--muted2);margin-bottom:4px;
  font-weight:600;letter-spacing:0.05em;}
.msg-input-row{
  display:flex;gap:8px;padding:12px 16px;
  border-top:1px solid var(--border);flex-shrink:0;
  background:var(--bg);
}
.msg-input{
  flex:1;padding:11px 14px;background:var(--s2);
  border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;
  outline:none;resize:none;-webkit-appearance:none;
}
.msg-send{
  padding:10px 16px;background:var(--red);color:white;
  border:none;border-radius:10px;font-weight:700;font-size:0.8rem;
  cursor:pointer;flex-shrink:0;
}

/* TIMER */
.timer-big{font-family:'Bebas Neue',sans-serif;font-size:5rem;
  letter-spacing:0.1em;color:var(--text);line-height:1;text-align:center;}
.timer-big.running{color:var(--red);}
.preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;}
.preset-btn{padding:14px 8px;background:var(--s2);border:1px solid var(--border);
  border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
  color:var(--muted2);cursor:pointer;text-align:center;transition:all 0.12s;}
.preset-btn.active{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.tc-btn{flex:1;padding:16px;border-radius:14px;font-weight:700;font-size:0.9rem;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;border:none;}
.tc-btn:active{transform:scale(0.97);}
.tc-start{background:var(--red);color:white;}
.tc-reset{background:var(--s3);color:var(--muted2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.2s ease both;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="ls-logo">KRATOS</div>
  <div class="ls-spinner"></div>
</div>

<!-- ── VIEW: PIANO ── -->
<div class="view" id="view-piano">
  <div class="status-bar">
    <div class="sb-left">
      <div class="sb-logo">KRATOS</div>
      <div class="sb-user" id="userLabel">—</div>
    </div>
    <div class="sb-right">
      <span class="sb-pill" id="phasePill">—</span>
      <button class="logout-btn" onclick="doLogout()">Esci</button>
    </div>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="scroll-area" id="dayList"></div>
</div>

<!-- ── VIEW: GIORNO ── -->
<div class="view" id="view-giorno">
  <div class="day-view-header">
    <div class="dvh-back" onclick="goBack()">‹ Piano</div>
    <div class="dvh-title" id="dvTitle">—</div>
    <div class="dvh-sub" id="dvSub">—</div>
  </div>
  <div class="scroll-area" id="dayContent"></div>
</div>

<!-- ── VIEW: MESSAGGI ── -->
<div class="view" id="view-msg" style="display:none;flex-direction:column;">
  <div class="status-bar">
    <div class="sb-left">
      <div class="sb-logo">KRATOS</div>
      <div class="sb-user">Messaggi Coach</div>
    </div>
  </div>
  <div class="scroll-area" id="msgList" style="flex:1;"></div>
  <div class="msg-input-row">
    <textarea class="msg-input" id="msgInput" placeholder="Scrivi al coach..." rows="1"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="msg-send" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- ── VIEW: TIMER ── -->
<div class="view" id="view-timer">
  <div class="status-bar">
    <div class="sb-logo">KRATOS</div>
    <span style="font-size:0.72rem;color:var(--muted2);">Timer Recupero</span>
  </div>
  <div class="scroll-area">
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0;">
      <div class="timer-big" id="timerDisplay">00:00</div>
      <div style="width:100%;">
        <div class="section-label">Preset recupero</div>
        <div class="preset-grid">
          <div class="preset-btn" onclick="setPreset(60)">1'</div>
          <div class="preset-btn" onclick="setPreset(90)">90''</div>
          <div class="preset-btn" onclick="setPreset(180)">3'</div>
          <div class="preset-btn" onclick="setPreset(300)">5'</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;width:100%;">
        <button class="tc-btn tc-start" id="timerBtn" onclick="toggleTimer()">START</button>
        <button class="tc-btn tc-reset" onclick="resetTimer()">RESET</button>
      </div>
      <div style="font-size:0.74rem;color:var(--muted);text-align:center;line-height:1.6;">
        Meccanici: <strong style="color:var(--text)">3–5 min</strong><br>
        Metabolici: <strong style="color:var(--text)">90''–2 min</strong>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="bnav-item active" id="nav-piano" onclick="switchView('piano')">
    <span class="bnav-icon">📅</span><span class="bnav-label">Piano</span>
  </button>
  <button class="bnav-item" id="nav-msg" onclick="switchView('msg')">
    <span class="bnav-icon">💬</span><span class="bnav-label">Coach</span>
  </button>
  <button class="bnav-item" id="nav-timer" onclick="switchView('timer')">
    <span class="bnav-icon">⏱️</span><span class="bnav-label">Timer</span>
  </button>
</nav>

var SUPABASE_URL = 'https://tzkokgpxqjeyuvyvmqtt.supabase.co';

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ───────────────────────────────────────────────────────────
var currentUser = null;
var currentProfile = null;
var currentProgram = null;
var currentWeekIdx = 0;
var currentDayIdx = null;
var currentView = 'piano';
var timerSecs = 0, timerRunning = false, timerInterval = null, activePreset = null;
var doneMap = {};

// ─── BOOT ────────────────────────────────────────────────────────────
function boot() {
  sb.auth.getSession().then(function(res) {
    if (!res.data || !res.data.session) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = res.data.session.user;

    sb.from('profiles').select('*').eq('id', currentUser.id).single()
      .then(function(r) {
        currentProfile = r.data || {};
        if (currentProfile.role === 'admin') {
          window.location.href = 'admin.html';
          return;
        }
        document.getElementById('userLabel').textContent =
          currentProfile.full_name || currentUser.email;

        // Load logbook
        sb.from('logbook').select('*').eq('athlete_id', currentUser.id)
          .then(function(lr) {
            (lr.data || []).forEach(function(l) { doneMap[l.key] = l; });
            currentProgram = getDefaultProgram();
            document.getElementById('loadingScreen').style.display = 'none';
            renderWeekStrip();
            renderDayList();
            loadMessages();
          }).catch(function() {
            currentProgram = getDefaultProgram();
            document.getElementById('loadingScreen').style.display = 'none';
            renderWeekStrip();
            renderDayList();
          });
      }).catch(function() {
        window.location.href = 'index.html';
      });
  }).catch(function() {
    window.location.href = 'index.html';
  });
}

// ─── RENDER WEEK STRIP ───────────────────────────────────────────────
function renderWeekStrip() {
  var weeks = currentProgram.weeks;
  var c = document.getElementById('weekStrip');
  c.innerHTML = '';
  for (var i = 0; i < weeks.length; i++) {
    (function(w, idx) {
      var chip = document.createElement('div');
      chip.className = 'week-chip' + (w.type === 'deload' ? ' deload' : '') + (idx === currentWeekIdx ? ' active' : '');
      chip.innerHTML = '<span class="wc-num">' + w.phase.split('\u00b7')[0].trim() + '</span><span class="wc-label">' + w.label + '</span>';
      chip.onclick = function() { currentWeekIdx = idx; renderWeekStrip(); renderDayList(); };
      c.appendChild(chip);
    })(weeks[i], i);
  }
  document.getElementById('phasePill').textContent = weeks[currentWeekIdx].phase;
}

// ─── RENDER DAY LIST ─────────────────────────────────────────────────
function renderDayList() {
  var week = currentProgram.weeks[currentWeekIdx];
  var c = document.getElementById('dayList');
  c.innerHTML = '';

  var lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = week.label + ' \u2014 ' + week.phase;
  c.appendChild(lbl);

  for (var i = 0; i < week.days.length; i++) {
    (function(d, idx) {
      var isDone  = d.note && d.note.indexOf('\u2705') === 0;
      var isToday = d.note === 'OGGI';
      var amType  = d.am ? d.am.type : 'rest';
      var pmType  = d.pm ? d.pm.type : 'rest';
      var hasGym  = amType === 'gym'  || pmType === 'gym';
      var hasBike = amType === 'bike' || pmType === 'bike';

      var row = document.createElement('div');
      row.className = 'day-row fade-in';
      row.style.animationDelay = (idx * 0.04) + 's';
      if (isDone)  row.style.opacity = '0.5';
      if (isToday) row.style.borderColor = 'var(--bike)';

      var sessHTML = '';
      if (amType === 'gym')  sessHTML += '<div class="dr-sess">'  + d.am.ref + '</div>';
      if (amType === 'bike') sessHTML += '<div class="dr-sess bike">\uD83D\uDEB5 ' + d.am.ref + '</div>';
      if (pmType === 'gym')  sessHTML += '<div class="dr-sess">'  + d.pm.ref + '</div>';
      if (pmType === 'bike') sessHTML += '<div class="dr-sess bike">\uD83D\uDEB5 ' + d.pm.ref + '</div>';
      if (!hasGym && !hasBike) sessHTML = '<div class="dr-sess rest">Riposo</div>';

      var badge = isDone
        ? '<span style="font-size:0.65rem;color:var(--green);font-weight:700;">\u2705</span>'
        : isToday
          ? '<span style="font-size:0.65rem;color:var(--bike);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;">OGGI</span>'
          : '<span class="dr-chevron">\u203a</span>';

      row.innerHTML =
        '<div class="dr-day" style="' + (isToday ? 'color:var(--bike)' : '') + '">' +
          d.day.slice(0,3).toUpperCase() +
        '</div>' +
        '<div class="dr-sessions">' + sessHTML + '</div>' +
        badge;

      row.onclick = function() { openDay(idx); };
      c.appendChild(row);
    })(week.days[i], i);
  }
}

// ─── OPEN DAY ────────────────────────────────────────────────────────
function openDay(dayIdx) {
  currentDayIdx = dayIdx;
  const week = currentProgram.weeks[currentWeekIdx];
  const day  = week.days[dayIdx];

  document.getElementById('dvTitle').textContent = day.day.toUpperCase();
  document.getElementById('dvSub').textContent   = week.label + ' · ' + week.phase;

  const area = document.getElementById('dayContent');
  area.innerHTML = '';
  area.scrollTop = 0;

  renderSession(area, day.am, 'Mattina', dayIdx, 'am');
  renderSession(area, day.pm, 'Sera',    dayIdx, 'pm');

  document.getElementById('view-piano').classList.remove('active');
  document.getElementById('view-giorno').classList.add('active');
  document.getElementById('view-giorno').style.display = 'flex';
}

function goBack() {
  document.getElementById('view-giorno').classList.remove('active');
  document.getElementById('view-piano').classList.add('active');
}

// ─── RENDER SESSION ──────────────────────────────────────────────────
function renderSession(container, sess, label, dayIdx, part) {
  if (!sess) return;
  const block = document.createElement('div');

  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = label;
  block.appendChild(lbl);

  if (sess.type === 'rest') {
    var rc = document.createElement('div');
    rc.className = 'card';
    rc.innerHTML = '<div class="card-head"><div class="card-icon">\uD83D\uDCA4</div>' +
      '<div class="card-title" style="color:var(--muted2)">Riposo</div>' +
      '<span class="card-badge badge-muted">Recovery</span></div>';
    block.appendChild(rc);
    container.appendChild(block);
    return;
  }

  if (sess.type === 'gym') {
    var hdr = document.createElement('div');
    hdr.className = 'card';
    hdr.innerHTML = '<div class="card-head"><div class="card-icon">\uD83C\uDFCB\uFE0F</div>' +
      '<div class="card-title">' + sess.ref + '</div>' +
      '<span class="card-badge badge-red">GYM</span></div>';
    block.appendChild(hdr);

    var exList = getExercises(sess.ref);
    if (exList.length) {
      var prog = document.createElement('div');
      prog.className = 'progress-row';
      for (var ei2 = 0; ei2 < exList.length; ei2++) {
        var dot = document.createElement('div');
        var dkey = currentWeekIdx + '-' + dayIdx + '-' + part + '-' + ei2;
        dot.className = 'prog-pill' + (doneMap[dkey] ? ' done' : '');
        dot.id = 'dot-' + dayIdx + '-' + part + '-' + ei2;
        prog.appendChild(dot);
      }
      block.appendChild(prog);
      for (var ei3 = 0; ei3 < exList.length; ei3++) {
        renderExercise(block, exList[ei3], dayIdx, part, ei3);
      }
    }
  }

  if (sess.type === 'bike') {
    var bc = document.createElement('div');
    bc.className = 'card';
    bc.innerHTML = '<div class="card-head"><div class="card-icon">\uD83D\uDEB5</div>' +
      '<div class="card-title">' + sess.ref + '</div>' +
      '<span class="card-badge badge-bike">BICI</span></div>' +
      '<div class="card-body" style="padding-top:12px;">' +
        '<div style="font-size:0.8rem;color:var(--muted2);line-height:1.7;">' +
          getBikeDesc(sess.ref) +
        '</div>' +
      '</div>';
    block.appendChild(bc);
  }

  container.appendChild(block);
}

// ─── LOGBOOK SAVE ────────────────────────────────────────────────────
function saveLog(dayIdx, part, ei) {
  var key    = currentWeekIdx + '-' + dayIdx + '-' + part + '-' + ei;
  var s1kg   = (document.getElementById('k1-'+dayIdx+'-'+part+'-'+ei)||{}).value;
  var s1reps = (document.getElementById('r1-'+dayIdx+'-'+part+'-'+ei)||{}).value;
  var s2kg   = (document.getElementById('k2-'+dayIdx+'-'+part+'-'+ei)||{}).value;
  var s2reps = (document.getElementById('r2-'+dayIdx+'-'+part+'-'+ei)||{}).value;
  var btn    = document.getElementById('savebtn-'+dayIdx+'-'+part+'-'+ei);
  if (btn) btn.textContent = '...';

  sb.from('logbook').upsert({
    athlete_id: currentUser.id,
    key: key,
    s1_kg: s1kg||null, s1_reps: s1reps||null,
    s2_kg: s2kg||null, s2_reps: s2reps||null,
    done: (doneMap[key] && doneMap[key].done) || false,
    updated_at: new Date().toISOString()
  }, { onConflict: 'athlete_id,key' }).then(function(r) {
    if (!r.error) {
      if (btn) { btn.textContent = '✓ Salvato'; btn.classList.add('saved'); }
      doneMap[key] = Object.assign({}, doneMap[key],
        {s1_kg:s1kg, s1_reps:s1reps, s2_kg:s2kg, s2_reps:s2reps});
      setTimeout(function() {
        if (btn) { btn.textContent = '💾 Salva logbook'; btn.classList.remove('saved'); }
      }, 1500);
    } else {
      if (btn) btn.textContent = '💾 Salva logbook';
    }
  });
}

// ─── TOGGLE DONE ────────────────────────────────────────────────────
function toggleDone(dayIdx, part, ei) {
  var key    = currentWeekIdx + '-' + dayIdx + '-' + part + '-' + ei;
  var item   = document.getElementById('ex-'+dayIdx+'-'+part+'-'+ei);
  var btn    = item ? item.querySelector('.done-btn') : null;
  var chk    = item ? item.querySelector('.ex-check') : null;
  var dot    = document.getElementById('dot-'+dayIdx+'-'+part+'-'+ei);
  var wasDone = doneMap[key] && doneMap[key].done;

  doneMap[key] = Object.assign({}, doneMap[key], {done: !wasDone});

  if (!wasDone) {
    if (item) item.classList.add('done');
    if (btn)  { btn.textContent='✓ Completato'; btn.classList.add('marked'); }
    if (chk)  chk.textContent='✓';
    if (dot)  dot.classList.add('done');
    if (item) item.classList.remove('open');
    var bd = document.getElementById('exb-'+dayIdx+'-'+part+'-'+ei);
    if (bd) bd.style.display='none';
  } else {
    if (item) item.classList.remove('done');
    if (btn)  { btn.textContent='Segna come fatto ✓'; btn.classList.remove('marked'); }
    if (chk)  chk.textContent='';
    if (dot)  dot.classList.remove('done');
  }

  sb.from('logbook').upsert({
    athlete_id: currentUser.id,
    key: key,
    done: !wasDone,
    updated_at: new Date().toISOString()
  }, { onConflict: 'athlete_id,key' }).catch(function() {});
}

function toggleEx(dayIdx, part, ei) {
  var body = document.getElementById('exb-' + dayIdx + '-' + part + '-' + ei);
  var item = document.getElementById('ex-'  + dayIdx + '-' + part + '-' + ei);
  if (!body) return;
  var isOpen = item.classList.contains('open');
  var openItems = document.querySelectorAll('.ex-item.open');
  for (var i = 0; i < openItems.length; i++) {
    openItems[i].classList.remove('open');
    var bd = openItems[i].querySelector('.ex-body');
    if (bd) bd.style.display = 'none';
  }
  if (!isOpen) { item.classList.add('open'); body.style.display = 'block'; }
}

// ─── MESSAGES ────────────────────────────────────────────────────────
function loadMessages() {
  sb.from('messages')
    .select('*')
    .or('athlete_id.eq.' + currentUser.id + ',recipient_id.eq.' + currentUser.id)
    .order('created_at', { ascending: true })
    .then(function(r) {
      renderMessages(r.data || []);
      // Realtime
      sb.channel('messages').on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'messages' },
        function(payload) {
          var msg = payload.new;
          if (msg.athlete_id === currentUser.id || msg.recipient_id === currentUser.id) {
            appendMessage(msg);
            scrollMsgs();
          }
        }
      ).subscribe();
    }).catch(function() {});
}

function renderMessages(msgs) {
  var list = document.getElementById('msgList');
  list.innerHTML = '';
  for (var i = 0; i < msgs.length; i++) appendMessage(msgs[i], false);
  scrollMsgs();
}

function appendMessage(msg, scroll) {
  if (scroll === undefined) scroll = true;
  var isCoach = msg.sender_role === 'admin';
  var list = document.getElementById('msgList');
  const div = document.createElement('div');
  div.className = 'msg-bubble ' + (isCoach ? 'coach' : 'athlete');
  div.innerHTML = '<div class="msg-meta">' + (isCoach ? '\uD83D\uDC64 Coach' : 'Tu') + ' \u00b7 ' + fmtDate(msg.created_at) + '</div>' + msg.text;
  list.appendChild(div);
  if (scroll) scrollMsgs();
}

function scrollMsgs() {
  var list = document.getElementById('msgList');
  list.scrollTop = list.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input ? input.value.trim() : '';
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  sb.from('messages').insert({
    athlete_id: currentUser.id,
    recipient_id: (currentProfile && currentProfile.coach_id) || null,
    text: text,
    sender_role: 'athlete',
    created_at: new Date().toISOString()
  }).catch(function() {});
}

function fmtDate(iso) {
  var d = new Date(iso);
  return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

// ─── VIEW SWITCHING ──────────────────────────────────────────────────
function switchView(name) {
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) {
    views[i].classList.remove('active');
    views[i].style.display = 'none';
  }
  var bnavs = document.querySelectorAll('.bnav-item');
  for (var j = 0; j < bnavs.length; j++) bnavs[j].classList.remove('active');

  var view = document.getElementById('view-'+name);
  if (view) { view.style.display = 'flex'; view.classList.add('active'); }
  var nav = document.getElementById('nav-'+name);
  if (nav) nav.classList.add('active');
  currentView = name;
  if (name === 'msg') setTimeout(scrollMsgs, 100);
}

// ─── TIMER ───────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function updateTimerDisplay(){
  var d = document.getElementById('timerDisplay');
  d.textContent = pad(Math.floor(timerSecs/60)) + ':' + pad(timerSecs%60);
}
function setPreset(s){
  resetTimer(); timerSecs = s; activePreset = s; updateTimerDisplay();
  var presets = document.querySelectorAll('.preset-btn');
  for (var i = 0; i < presets.length; i++) presets[i].classList.remove('active');
  var idx = [60,90,180,300].indexOf(s);
  if (idx >= 0) presets[idx].classList.add('active');
  toggleTimer();
}
function toggleTimer(){
  const btn=document.getElementById('timerBtn');
  const disp=document.getElementById('timerDisplay');
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    btn.textContent='START';disp.classList.remove('running');
  } else {
    if(timerSecs===0&&activePreset) timerSecs=activePreset;
    timerInterval=setInterval(()=>{
      if(timerSecs>0){timerSecs--;updateTimerDisplay();}
      else{clearInterval(timerInterval);timerRunning=false;
        btn.textContent='START';disp.classList.remove('running');}
    },1000);
    timerRunning=true;btn.textContent='STOP';disp.classList.add('running');
  }
}
function resetTimer(){
  clearInterval(timerInterval);timerRunning=false;
  timerSecs=activePreset||0;updateTimerDisplay();
  document.getElementById('timerBtn').textContent='START';
  document.getElementById('timerDisplay').classList.remove('running');
}
